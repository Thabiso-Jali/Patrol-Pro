<VirtualHost *:80>
    ServerName your-domain.com
    ServerAlias www.your-domain.com
    DocumentRoot /var/www/patrol-pro/php-app/public

    <Directory /var/www/patrol-pro/php-app/public>
        Options -Indexes
        AllowOverride All
        Require all granted
        FallbackResource /router.php
    </Directory>

    <Directory /var/www/patrol-pro/php-app/public/uploads>
        php_admin_flag engine off
        Options -Indexes
    </Directory>

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    ErrorLog ${APACHE_LOG_DIR}/patrol-pro-error.log
    CustomLog ${APACHE_LOG_DIR}/patrol-pro-access.log combined
</VirtualHost>
